<script>
const AppState={searchMode:'search',construct:{parts:[]},uniprotCache:{},rawDataCache:{},expandedParts:new Set(),zone3Tab:'function',pubSortAsc:false,zone3SelectedPart:0,mutSelectedPart:-1};
const DOMAIN_COLORS=[{main:'#0891b2',bg:'#cffafe',border:'#67e8f9'},{main:'#7c3aed',bg:'#ede9fe',border:'#c4b5fd'},{main:'#0d9488',bg:'#ccfbf1',border:'#5eead4'},{main:'#4f46e5',bg:'#e0e7ff',border:'#a5b4fc'},{main:'#be185d',bg:'#fce7f3',border:'#f9a8d4'},{main:'#ea580c',bg:'#fff7ed',border:'#fdba74'}];
const PART_COLORS={signal:{main:'#16a34a',bg:'#dcfce7',border:'#86efac'},tag:{main:'#d97706',bg:'#fef3c7',border:'#fcd34d'},linker:{main:'#6b7280',bg:'#f3f4f6',border:'#d1d5db'},protease:{main:'#dc2626',bg:'#fef2f2',border:'#fca5a5'}};
const PROTEIN_COLORS=['#0891b2','#7c3aed','#0d9488','#4f46e5','#be185d','#ea580c'];
const undoHistory=[];
function saveUndo(){undoHistory.push(JSON.stringify({parts:AppState.construct.parts,expanded:[...AppState.expandedParts]}));if(undoHistory.length>30)undoHistory.shift();document.getElementById('undoBtn').style.display=undoHistory.length>0?'':'none';}
function performUndo(){if(undoHistory.length===0)return;const state=JSON.parse(undoHistory.pop());AppState.construct.parts=state.parts;AppState.expandedParts=new Set(state.expanded);document.getElementById('undoBtn').style.display=undoHistory.length>0?'':'none';renderAll();}
function getPartColor(part,partIndex){if(part.type==='protein'){let pIdx=0;for(let i=0;i<partIndex;i++){if(AppState.construct.parts[i].type==='protein')pIdx++;}return{main:PROTEIN_COLORS[pIdx%PROTEIN_COLORS.length],bg:'#cffafe',border:'#67e8f9'};}return PART_COLORS[part.type]||PART_COLORS.tag;}
let searchDebounce=null;
async function searchUniProt(query){if(!query||query.length<2)return[];const url=`https://rest.uniprot.org/uniprotkb/search?query=${encodeURIComponent(query)}&size=10&fields=accession,id,protein_name,gene_names,organism_name,length,reviewed`;try{const res=await fetch(url,{headers:{'Accept':'application/json'}});if(!res.ok)throw new Error(`HTTP ${res.status}`);const data=await res.json();return(data.results||[]).map(r=>({accession:r.primaryAccession,entryName:r.uniProtkbId||r.primaryAccession,name:r.proteinDescription?.recommendedName?.fullName?.value||r.proteinDescription?.submissionNames?.[0]?.fullName?.value||'Unknown',gene:r.genes?.[0]?.geneName?.value||r.genes?.[0]?.orfNames?.[0]?.value||'—',organism:r.organism?.scientificName||'—',length:r.sequence?.length||0,reviewed:r.entryType==='UniProtKB reviewed (Swiss-Prot)'}));}catch(e){console.error('UniProt search error:',e);return[];}}
async function fetchUniProtEntry(accession){const url=`https://rest.uniprot.org/uniprotkb/${accession}.json`;try{const res=await fetch(url,{headers:{'Accept':'application/json'}});if(!res.ok)throw new Error(`HTTP ${res.status}`);return await res.json();}catch(e){console.error('UniProt fetch error:',e);return null;}}
function parseUniProtToProteinPart(data){const accession=data.primaryAccession;const entryName=data.uniProtkbId||accession;const name=data.proteinDescription?.recommendedName?.fullName?.value||data.proteinDescription?.submissionNames?.[0]?.fullName?.value||accession;const gene=data.genes?.[0]?.geneName?.value||data.genes?.[0]?.orfNames?.[0]?.value||'—';const organism=data.organism?.scientificName||'—';const fullSeq=data.sequence?.value||'';const length=fullSeq.length;const mw=data.sequence?.molWeight||(length*110);const features=data.features||[];const segmentTypes=new Set(['Domain','Region','Repeat','Motif','Transmembrane','Intramembrane','Topological domain','Coiled coil','Compositional bias','Zinc finger','DNA binding','Propeptide','Transit peptide']);const PRIORITY_TYPES=new Set(['Domain','Transmembrane','Repeat','Zinc finger','DNA binding','Propeptide','Transit peptide','Motif','Coiled coil','Compositional bias']);let signalPeptide=null;const domainFeatures=[];const topoFeatures=[];features.forEach(f=>{const start=f.location?.start?.value;const end=f.location?.end?.value;if(!start||!end)return;if(f.type==='Signal peptide'||f.type==='Signal'){signalPeptide={name:'Signal peptide',type:'Signal peptide',start,end,sequence:fullSeq.slice(start-1,end),description:f.description||'Native signal peptide'};}else if(f.type==='Topological domain'){const desc=(f.description||'').toLowerCase();topoFeatures.push({type:desc.includes('cytoplasmic')?'cytoplasmic':desc.includes('extracellular')?'extracellular':'other',label:f.description||'Topological domain',start,end});}else if(f.type==='Transmembrane'){topoFeatures.push({type:'membrane',label:'TM',start,end});domainFeatures.push({uniprotType:'Transmembrane',name:'Transmembrane',start,end,sequence:fullSeq.slice(start-1,end),description:f.description?'Transmembrane ('+f.description+')':'Transmembrane domain',isTM:true});}else if(segmentTypes.has(f.type)&&f.type!=='Topological domain'){domainFeatures.push({uniprotType:f.type,name:f.description||f.type,start,end,sequence:fullSeq.slice(start-1,end),description:f.description||'',isTM:false});}});domainFeatures.sort((a,b)=>a.start-b.start);
// Remove Regions that are fully covered by Domain-type features
const priorityFeats=domainFeatures.filter(f=>PRIORITY_TYPES.has(f.uniprotType));
const filteredFeats=domainFeatures.filter(f=>{
if(PRIORITY_TYPES.has(f.uniprotType))return true;
// Keep Region only if no priority feature covers same range
return!priorityFeats.some(pf=>pf.start<=f.start&&pf.end>=f.end&&pf!==f);
});
// Also remove Regions that overlap with priority features
const finalFeats=[];filteredFeats.forEach(f=>{
if(!PRIORITY_TYPES.has(f.uniprotType)){
const overlaps=priorityFeats.some(pf=>f.start<pf.end&&f.end>pf.start);
if(!overlaps)finalFeats.push(f);
}else finalFeats.push(f);
});
finalFeats.sort((a,b)=>a.start-b.start);const segments=[];let cursor=signalPeptide?signalPeptide.end+1:1;finalFeats.forEach(df=>{if(df.start>cursor){segments.push({name:`Region ${cursor}\u2013${df.start-1}`,type:'unannotated',start:cursor,end:df.start-1,sequence:fullSeq.slice(cursor-1,df.start-1),description:'Unannotated region',active:true,isTM:false});}if(df.start>=cursor){segments.push({name:df.name,type:df.uniprotType,start:df.start,end:df.end,sequence:df.sequence,description:df.description,active:true,isTM:df.isTM||false});cursor=df.end+1;}});if(cursor<=length){segments.push({name:segments.length>0?`Region ${cursor}\u2013${length}`:name,type:segments.length>0?'unannotated':'full',start:cursor,end:length,sequence:fullSeq.slice(cursor-1),description:segments.length>0?'Unannotated region':'Full protein sequence',active:true,isTM:false});}if(segments.length===0){segments.push({name,type:'full',start:1,end:length,sequence:fullSeq,description:'Full protein sequence',active:true,isTM:false});}const ssPerResidue=new Array(length).fill('loop');features.forEach(f=>{const start=f.location?.start?.value;const end=f.location?.end?.value;if(!start||!end)return;if(f.type==='Helix')for(let i=start-1;i<end&&i<length;i++)ssPerResidue[i]='helix';else if(f.type==='Beta strand')for(let i=start-1;i<end&&i<length;i++)ssPerResidue[i]='strand';});segments.forEach(seg=>{seg.ss=ssPerResidue.slice(seg.start-1,seg.end);if(!seg.mutations)seg.mutations=[];});const mutations=features.filter(f=>f.type==='Natural variant'||f.type==='Mutagenesis').map(f=>{const alt=f.alternativeSequence||{};return{type:f.type,position:f.location?.start?.value||0,original:alt.originalSequence||'?',alternatives:alt.alternativeSequences||[],change:f.description||''};});const otherFeatures=features.filter(f=>!segmentTypes.has(f.type)&&!['Signal peptide','Signal','Helix','Beta strand','Turn','Natural variant','Mutagenesis'].includes(f.type)).map(f=>({type:f.type,start:f.location?.start?.value||'?',end:f.location?.end?.value||'?',description:f.description||f.type}));const publications=(data.references||[]).map(ref=>({title:ref.citation?.title||'Untitled',authors:(ref.citation?.authors||[]).slice(0,5).join(', ')+((ref.citation?.authors||[]).length>5?' et al.':''),journal:ref.citation?.journal||'',year:ref.citation?.publicationDate||'',pubmedId:ref.citation?.citationCrossReferences?.find(x=>x.database==='PubMed')?.id||null}));return{part:{type:'protein',name,entryName,gene,organism,accession,source:'uniprot',fullSequence:fullSeq,length,mw,segments,expanded:false},signalPeptide,topoFeatures,mutations,features:otherFeatures,publications,ssPerResidue};}
function getAssembledSequence(){let seq='';AppState.construct.parts.forEach(p=>{if(p.type==='protein')p.segments.filter(s=>s.active).forEach(s=>{let segSeq=s.sequence.split('');(s.mutations||[]).forEach(m=>{const idx=m.position-s.start;if(idx>=0&&idx<segSeq.length)segSeq[idx]=m.mutant;});seq+=segSeq.join('');});else{let partSeq=(p.sequence||'').split('');(p.mutations||[]).forEach(m=>{const idx=m.position-1;if(idx>=0&&idx<partSeq.length)partSeq[idx]=m.mutant;});seq+=partSeq.join('');}});return seq;}

async function loadProtein(accession){const data=await fetchUniProtEntry(accession);if(!data){alert('Failed to fetch protein data.');return;}const parsed=parseUniProtToProteinPart(data);saveUndo();AppState.construct.parts=[];AppState.expandedParts.clear();AppState.uniprotCache={};AppState.rawDataCache={};AppState.uniprotCache[accession]=parsed;AppState.rawDataCache[accession]=data;const sigLen=parsed.signalPeptide?parsed.signalPeptide.sequence.length:0;const segLen=parsed.part.segments.reduce((a,s)=>a+s.sequence.length,0);if(sigLen+segLen!==parsed.part.fullSequence.length)console.warn('Sequence integrity mismatch');if(parsed.signalPeptide){AppState.construct.parts.push({type:'signal',name:`${parsed.part.gene||parsed.part.name} signal`,entryName:`${parsed.part.gene||parsed.part.entryName} signal`,source:'uniprot',sequence:parsed.signalPeptide.sequence,description:parsed.signalPeptide.description,originalRange:`${parsed.signalPeptide.start}\u2013${parsed.signalPeptide.end}`,ss:new Array(parsed.signalPeptide.sequence.length).fill('loop'),mutations:[]});}AppState.construct.parts.push(parsed.part);AppState.mutSelectedPart=AppState.construct.parts.length-1;AppState.zone3SelectedPart=AppState.construct.parts.length-1;document.getElementById('searchDropdown').classList.remove('visible');document.getElementById('searchInput').value='';renderAll();}

function renderLinkersList(){const list=document.getElementById('linkerEntries');if(!list)return;const filtered=linkerCatFilter==='all'?COMMON_LINKERS:COMMON_LINKERS.filter(l=>l.cat===linkerCatFilter);list.innerHTML='';filtered.forEach(lnk=>{const div=document.createElement('div');div.style.cssText='padding:8px 10px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .1s;border-radius:4px';div.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center"><div><span style="font-weight:600;font-size:12px;color:var(--color-linker)">'+lnk.name+'</span><span style="font-size:10px;color:var(--text-tertiary);margin-left:6px">'+lnk.sequence.length+' aa</span></div><span style="font-size:9px;padding:1px 5px;border-radius:3px;background:var(--bg-subtle);color:var(--text-tertiary);font-weight:500">'+lnk.cat+'</span></div><div style="font-size:10px;color:var(--text-tertiary);margin-top:2px">'+lnk.use+'</div><div style="font-family:var(--font-mono);font-size:9px;color:var(--text-tertiary);margin-top:2px;opacity:.7">'+lnk.sequence+'</div>';div.addEventListener('mouseenter',function(){this.style.background='var(--bg-subtle)';});div.addEventListener('mouseleave',function(){this.style.background='';});div.addEventListener('click',function(){addPartToConstruct('linker',lnk.name,lnk.sequence);});list.appendChild(div);});}

function renderConjList(){const list=document.getElementById('conjEntries');if(!list)return;list.innerHTML='';CONJ_SEQUENCES.forEach(c=>{const div=document.createElement('div');div.style.cssText='padding:8px 10px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .1s;border-radius:4px';div.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center"><div><span style="font-weight:600;font-size:12px;color:#d97706">'+c.name+'</span><span style="font-size:10px;color:var(--text-tertiary);margin-left:6px">'+c.sequence.length+' aa</span></div></div><div style="font-size:10px;color:var(--text-tertiary);margin-top:2px">'+c.use+'</div><div style="font-family:var(--font-mono);font-size:9px;color:var(--text-tertiary);margin-top:2px;opacity:.7">'+c.sequence+'</div>';div.addEventListener('mouseenter',function(){this.style.background='var(--bg-subtle)';});div.addEventListener('mouseleave',function(){this.style.background='';});div.addEventListener('click',function(){addPartToConstruct('tag',c.name,c.sequence);});list.appendChild(div);});}

let COMMON_TAGS=[];
let tagCatFilter='all';
function renderTagsList(){const list=document.getElementById('tagEntries');if(!list)return;const filtered=tagCatFilter==='all'?COMMON_TAGS:COMMON_TAGS.filter(t=>t.cat===tagCatFilter);list.innerHTML='';filtered.forEach(tag=>{const div=document.createElement('div');div.style.cssText='padding:8px 10px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .1s;border-radius:4px';div.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center"><div><span style="font-weight:600;font-size:12px;color:#d97706">'+tag.name+'</span><span style="font-size:10px;color:var(--text-tertiary);margin-left:6px">'+tag.sequence.length+' aa</span></div><span style="font-size:9px;padding:1px 5px;border-radius:3px;background:var(--bg-subtle);color:var(--text-tertiary);font-weight:500">'+tag.cat+'</span></div><div style="font-size:10px;color:var(--text-tertiary);margin-top:2px">'+tag.use+'</div><div style="font-family:var(--font-mono);font-size:9px;color:var(--text-tertiary);margin-top:2px;opacity:.7">'+tag.sequence.slice(0,35)+(tag.sequence.length>35?'\u2026':'')+'</div>';div.addEventListener('mouseenter',function(){this.style.background='var(--bg-subtle)';});div.addEventListener('mouseleave',function(){this.style.background='';});div.addEventListener('click',function(){addPartToConstruct('tag',tag.name,tag.sequence);});list.appendChild(div);});}

function addPartToConstruct(type,name,sequence){
var position=AppState.construct.parts.length>0?'end':'start';
if(AppState.construct.parts.length>0){
if(!confirm('Add '+name+' ('+sequence.length+' aa) to the C-terminus of your construct?\nYou can drag to reorder after adding.'))return;
}
saveUndo();
AppState.construct.parts.push({type:type,name:name,entryName:name,source:'library',sequence:sequence,description:name,originalRange:'1\u2013'+sequence.length,ss:new Array(sequence.length).fill('loop'),mutations:[]});
renderAll();
}

CONJ_SEQUENCES=lib.conjugation||[];
COMMON_TAGS=(lib.tags||[]).map(t=>({...t,cat:t.category}));
renderSignalsList();renderLinkersList();renderConjList();renderTagsList();
}).catch(e=>console.warn('Parts library not loaded:',e));

async function addProteinPart(accession){addPartPopup.style.display='none';const data=await fetchUniProtEntry(accession);if(!data){alert('Failed to fetch.');return;}const parsed=parseUniProtToProteinPart(data);saveUndo();AppState.uniprotCache[accession]=parsed;AppState.rawDataCache[accession]=data;const part=parsed.part;if(parsed.signalPeptide){part.segments.unshift({name:'Signal peptide',type:'Signal peptide',start:parsed.signalPeptide.start,end:parsed.signalPeptide.end,sequence:parsed.signalPeptide.sequence,description:parsed.signalPeptide.description,active:true,isTM:false,mutations:[],ss:new Array(parsed.signalPeptide.sequence.length).fill('loop')});}AppState.construct.parts.push(part);renderAll();}
document.getElementById('addPartPasteBtn').addEventListener('click',()=>{let seq=document.getElementById('addPartPasteArea').value.trim();const name=document.getElementById('addPartName').value.trim()||'Custom sequence';if(seq.startsWith('>')){const lines=seq.split('\n');seq=lines.slice(1).join('').trim();}seq=seq.replace(/[\s\d]/g,'').toUpperCase();if(!/^[ACDEFGHIKLMNPQRSTVWY]+$/.test(seq)){alert('Invalid amino acid characters.');return;}if(seq.length<2){alert('Sequence too short.');return;}saveUndo();AppState.construct.parts.push({type:'protein',name:name,entryName:name,gene:'\u2014',organism:'\u2014',accession:null,source:'custom',fullSequence:seq,length:seq.length,mw:calculateMW(seq),segments:[{name:name,type:'full',start:1,end:seq.length,sequence:seq,description:'Custom sequence',active:true,isTM:false,mutations:[],ss:new Array(seq.length).fill('loop')}],expanded:false});document.getElementById('addPartPasteArea').value='';document.getElementById('addPartName').value='';addPartPopup.style.display='none';renderAll();});

d.innerHTML='<div style="font-weight:600">'+r.entryName+'</div><div style="color:var(--text-tertiary);font-size:10px">'+r.accession+' \u00B7 '+r.gene+' \u00B7 '+r.organism+'</div>';
d.addEventListener('mouseenter',function(){this.style.background='var(--bg-subtle)';});
d.addEventListener('mouseleave',function(){this.style.background='';});
d.addEventListener('click',(function(acc,eName,org){return async function(){
res.innerHTML='<div style="padding:6px;color:var(--text-tertiary);font-size:11px">Fetching signal\u2026</div>';
var data=await fetchUniProtEntry(acc);
if(!data){res.innerHTML='<div style="padding:6px;color:#dc2626;font-size:11px">Failed</div>';return;}
var sf=(data.features||[]).find(function(f){return f.type==='Signal peptide'||f.type==='Signal';});
if(!sf){res.innerHTML='<div style="padding:6px;color:var(--text-tertiary);font-size:11px">No signal peptide in this entry</div>';return;}
var seq=(data.sequence?.value||'').slice(sf.location.start.value-1,sf.location.end.value);
if(seq)addSignalToConstruct(eName+' signal',seq,org);
sigSInput.value='';res.innerHTML='';
};})(r.accession,r.entryName,r.organism));
res.appendChild(d);
});
},400);
});
renderAll();});
// Amino acid rain animation
(function(){
const canvas=document.getElementById('aaRainCanvas');if(!canvas)return;
const ctx=canvas.getContext('2d');
const AAs='ACDEFGHIKLMNPQRSTVWY';
const drops=[];
const NUM=40;
function resize(){canvas.width=canvas.offsetWidth*2;canvas.height=canvas.offsetHeight*2;ctx.scale(2,2);}
resize();window.addEventListener('resize',resize);
for(let i=0;i<NUM;i++){drops.push({x:Math.random()*1600,y:Math.random()*200-200,speed:0.3+Math.random()*0.6,size:12+Math.random()*8,opacity:0.04+Math.random()*0.06,char:AAs[Math.floor(Math.random()*20)]});}
function draw(){const w=canvas.offsetWidth,h=canvas.offsetHeight;ctx.clearRect(0,0,w,h);
drops.forEach(d=>{d.y+=d.speed;if(d.y>h+20){d.y=-20;d.x=Math.random()*w;d.char=AAs[Math.floor(Math.random()*20)];d.opacity=0.04+Math.random()*0.06;}
ctx.fillStyle='rgba(37,99,235,'+d.opacity+')';ctx.font='500 '+d.size+'px IBM Plex Mono,monospace';ctx.fillText(d.char,d.x,d.y);});
requestAnimationFrame(draw);}
draw();
})();
